name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync meta.xml version with tag
        run: sed -i "s|<version>.*</version>|<version>${GITHUB_REF_NAME#v}</version>|" xve-laravel-kit/src/meta.xml

      - name: Build extension zip
        run: bash xve-laravel-kit/build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: xve-laravel-kit/dist/xve-laravel-kit-*.zip
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # From file
            plesk bin extension --install xve-laravel-kit-${{ steps.version.outputs.version }}.zip

            # From URL
            plesk bin extension --install-url https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xve-laravel-kit-${{ steps.version.outputs.version }}.zip
            ```
